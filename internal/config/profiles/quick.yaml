name: quick
parallelism: 5
timeout: 5m
benches:
  network:
    duration: 10s
    protocols: [tcp, udp]
    combinations: [same-node, cross-node]
  storage:
    duration: 10s
    size: 1Gi
    block_sizes: [4k]
    patterns: [randread, randwrite]
  dns:
    duration: 10s
    queries_per_second: 50
    targets: [in-cluster]
  api:
    duration: 5s
    operations: [list-pods, list-namespaces, get-pod]
  pod:
    sample_count: 5
    pause_image: registry.k8s.io/pause:3.9
    cpu_duration: 10s
