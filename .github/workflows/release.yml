name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {goos: linux,   goarch: amd64}
          - {goos: linux,   goarch: arm64}
          - {goos: darwin,  goarch: amd64}
          - {goos: darwin,  goarch: arm64}
          - {goos: windows, goarch: amd64, ext: .exe}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev-${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BIN="benchbuddy-${{ steps.ver.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/clementlevoux/benchbuddy/internal/cli.version=${{ steps.ver.outputs.version }}" \
            -o "dist/${BIN}" \
            ./cmd/benchbuddy

      - name: Generate checksum
        working-directory: dist
        run: sha256sum * > "benchbuddy-${{ steps.ver.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: benchbuddy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 14

  release:
    name: github release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: dist
        run: |
          cat *.sha256 | sort > SHA256SUMS
          rm -f *.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
